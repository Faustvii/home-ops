---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Konflate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  KONFLATE_DOMAIN: ${{ secrets.KONFLATE_DOMAIN }}

jobs:
  comment:
    name: Konflate - Comment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Fetch rendered summary
        id: fetch
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          if status="$(curl -fsS --retry 10 --retry-delay 3 \
               -H 'Accept: text/markdown' \
               -o summary.md -w '%header{x-konflate-render-status}' \
               "https://${KONFLATE_DOMAIN}/api/prs/${PR}/summary")" \
             && [ -s summary.md ]; then
            {
              echo "ready=true"
              echo "status=${status}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "konflate summary unavailable or empty — skipping; next push retries."
          fi

      - name: Add Comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: konflate-summary
          path: summary.md

      - name: Fail on render issue
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          STATUS: ${{ steps.fetch.outputs.status }}
        run: |
          case "$STATUS" in
            ok)        echo "konflate render: ok" ;;
            failures)  echo "::error::konflate render: one or more resources failed to render"; exit 1 ;;
            error)     echo "::error::konflate render: render errored (no diff)"; exit 1 ;;
            *)         echo "::warning::konflate render: unexpected status '${STATUS}'" ;;
          esac

  success:
    if: ${{ !cancelled() }}
    needs: [comment]
    name: Konflate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: echo "All jobs passed or skipped" && echo "$RESULTS"
