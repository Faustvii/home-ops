---
name: "Labeler"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Labeler
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          configuration-path: .github/labeler.yaml
