---
name: "Labeler"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          configuration-path: .github/labeler.yaml
