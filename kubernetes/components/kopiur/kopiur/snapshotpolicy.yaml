---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: "${APP}"
spec:
  copyMethod: Snapshot
  credentialProjection:
    enabled: true
  mover:
    securityContext:
      runAsUser: ${KOPIUR_PUID:=1000}
      runAsGroup: ${KOPIUR_PGID:=1000}
  repository:
    kind: ClusterRepository
    name: ${KOPIUR_REPOSITORY:=nas}
  retention:
    keepLatest: 3
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
  sources:
    - pvc:
        name: ${KOPIUR_PVC:=${APP}}
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=miroir-snapshot}
  verification:
    quick:
      schedule:
        cron: H 3 * * *
        jitter: 2m
