---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ${APP}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ${APP}
  oidc:
    provider:
      issuer: https://pocket-id.${SECRET_DOMAIN}
    clientID: ${APP}
    clientSecret:
      name: ${APP}-oidc-credentials
    redirectURL: https://${APP}.${SECRET_DOMAIN}${OIDC_CALLBACK_PATH:=/oauth2/callback}
    logoutPath: ${OIDC_PROVIDER_LOGOUT_PATH:=/logout}
