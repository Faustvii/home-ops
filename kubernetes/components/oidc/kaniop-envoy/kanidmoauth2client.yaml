---
# yaml-language-server: $schema=https://schemas.web.garage.k8shub.tech/kaniop.rs/kanidmoauth2client_v1beta1.json
apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: ${APP}
spec:
  kanidmRef:
    name: kanidm
    namespace: security
  displayname: ${OIDC_APP_NAME}
  origin: https://${APP}.${SECRET_DOMAIN}
  image:
    url: ${OIDC_IMAGE_URL:=${OIDC_IMAGE_HOST:=https://cdn.jsdelivr.net/gh/selfhst/icons/svg}/${OIDC_IMAGE_NAME:=${APP}}.svg}
  redirectUrl:
    - https://${APP}.${SECRET_DOMAIN}${OIDC_CALLBACK_PATH:=/oauth2/callback}
  scopeMap:
    - group: ${APP}-users
      scopes: [openid, profile, email, groups]
    - group: ${OIDC_ADMIN_GROUP:=admins}
      scopes: [openid, profile, email, groups]
