---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: &app minecraft
  labels:
    metrics: *app
spec:
  selector:
    matchLabels:
      app: *app
  podTargetLabels:
    - app
  podMetricsEndpoints:
    - port: metrics
      relabelings:
        - action: replace
          replacement: wonderland
          targetLabel: instance
        - action: replace
          replacement: minecraft
          targetLabel: job
