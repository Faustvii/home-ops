---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app radarr
spec:
  interval: 1h
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: pocket-id
      namespace: security
  path: ./kubernetes/apps/default/radarr/app
  postBuild:
    substitute:
      APP: *app
      OIDC_APP_NAME: Radarr
      OIDC_CALLBACK_PATH: /oauth2/callback
      OIDC_LOGOUT_CALLBACK_PATH: /
      OIDC_PROVIDER_LOGOUT_PATH: /logout
      VOLSYNC_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
