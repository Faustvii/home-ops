---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-schema-publisher
spec:
  chartRef:
    kind: OCIRepository
    name: crd-schema-publisher
  interval: 1h
  values:
    extraVolumes:
      - name: rclone-tmp
        emptyDir: {}

    # rclone sidecar — syncs the shared output volume to S3-compatible storage.
    # The "output" volume is the chart's default emptyDir.
    extraContainers:
      - name: rclone
        image: ghcr.io/rclone/rclone:1.74.4
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Wait for the publisher to complete its first successful build.
            # If this path never appears, the sidecar stays fail-closed and
            # does not delete remote content.
            while [ ! -f /data/current/index.html ]; do
              sleep 5;
              echo "Waiting for publisher to complete its first successful build..."
            done

            while true; do
              if [ ! -f /data/current/index.html ]; then
                sleep 5
                continue
              fi
              rclone sync /data/current s3:$${RCLONE_S3_BUCKET} --exclude "/_meta/**" --checksum --verbose --transfers 4
              sleep 60
            done

        env:
          # -- rclone S3-compatible remote configuration via env vars.
          # See provider examples in the header comment for provider/endpoint values.
          - name: RCLONE_CONFIG_S3_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_S3_PROVIDER
            value: "Other" # <-- your provider (AWS, Minio, Cloudflare, GCS, or Other)
          # Suppress default config file lookup — all config is via RCLONE_CONFIG_* env vars
          - name: RCLONE_CONFIG
            value: ""
          - name: RCLONE_CONFIG_S3_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: crd-schemas-key
                key: endpoint
          - name: RCLONE_CONFIG_S3_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: crd-schemas-key
                key: access-key-id
          - name: RCLONE_CONFIG_S3_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: crd-schemas-key
                key: secret-access-key
          - name: RCLONE_S3_BUCKET
            value: schemas
          - name: RCLONE_CONFIG_S3_REGION
            value: "garage"
          - name: RCLONE_CONFIG_S3_LOCATION_CONSTRAINT
            value: "garage"
          - name: RCLONE_CONFIG_S3_FORCE_PATH_STYLE
            value: "true"
          - name: RCLONE_CONFIG_S3_NO_CHECK_BUCKET
            value: "true"

        volumeMounts:
          - name: output
            mountPath: /data
            readOnly: true
          - name: rclone-tmp
            mountPath: /tmp
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
        securityContext:
          runAsUser: 65534
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
