---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wyoming-whisper
  namespace: home
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  dependsOn: []
  interval: 1h

  values:
    controllers:
      wyoming-whisper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rhasspy/wyoming-whisper
              tag: 3.3.1@sha256:258956d1508a042ae52ceca04da85f6e74e7fab81676e3678619b8047e88c721
            args:
              - --model
              - base
              - --language
              - en
            env:
              WYOMING_WHISPER__INSTANCE_NAME: Wyoming-Whisper
              WYOMING_WHISPER__PORT: &port 10300
              WYOMING_WHISPER__LOG_LEVEL: info
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 4Gi
    service:
      app:
        controller: wyoming-whisper
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.10.40
        ports:
          whisper:
            enabled: true
            primary: true
            port: *port
            protocol: TCP
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
