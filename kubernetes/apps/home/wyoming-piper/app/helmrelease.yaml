---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wyoming-piper
  namespace: home
spec:
  chartRef:
    kind: OCIRepository
    name: wyoming-piper
  dependsOn: []
  interval: 1h

  values:
    controllers:
      wyoming-piper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rhasspy/wyoming-piper
              tag: 2.3.1@sha256:69b7f797ae3a8c3c0202cbf97152fb795d78c2355de2a31655c20671247360d8
            args:
              - --voice=en-gb-southern_english_female-low
            resources:
              requests:
                cpu: 100m
                memory: 128M
              limits:
                memory: 512M
        pod:
          enableServiceLinks: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: wyoming-piper
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.10.41
          external-dns.alpha.kubernetes.io/hostname: piper.${SECRET_DOMAIN}
        ports:
          http:
            port: 10200
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
