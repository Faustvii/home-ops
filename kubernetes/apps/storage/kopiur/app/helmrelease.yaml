---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    extraVolumes:
      - name: repo
        nfs:
          server: truenas.faust
          path: /mnt/standard/volsync/kopiur
    extraVolumeMounts:
      - name: repo
        mountPath: /repo
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      prometheusRule:
        enabled: true
      serviceMonitor:
        enabled: true
    installScope: cluster
    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 1000
      runAsGroup: 1000
      runAsUser: 1000
      fsGroupChangePolicy: OnRootMismatch

    features:
      credentialProjection:
        enabled: true
    webhook:
      tls:
        mode: self
      serviceMonitor:
        enabled: true
