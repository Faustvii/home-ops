# yaml-language-server: $schema=https://raw.githubusercontent.com/rajsinghtech/garage-operator/refs/heads/main/schemas/garagecluster_v1alpha1.json
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageCluster
metadata:
  name: garage
spec:
  replicas: 1
  image: dxflrs/garage:v2.3.0

  # Zone for this cluster - used for fault tolerance
  zone: eu-west-1

  replication:
    factor: 2
    consistencyMode: degraded
    zoneRedundancy: "Maximum"

  storage:
    metadata:
      size: 10Gi
    data:
      size: 100Gi

  network:
    rpcBindPort: 3901
    # Shared RPC secret - MUST be same across all clusters
    rpcPublicAddr: "192.168.10.51:3901"
    rpcSecretRef:
      key: GARAGE_RPC_SECRET
      name: garage-cluster
    service:
      type: ClusterIP

  s3Api:
    rootDomain: .s3.garage.${SECRET_DOMAIN}
    bindPort: 3900
    region: garage

  webApi:
    bindPort: 3902
    rootDomain: .web.garage.${SECRET_DOMAIN}

  admin:
    enabled: true
    bindPort: 3903
    adminTokenSecretRef:
      key: GARAGE_ADMIN_TOKEN
      name: garage-cluster

  # How remote clusters reach this cluster's nodes
  publicEndpoint:
    type: ExternalIP
    externalIP:
      addresses:
        garage-0: "192.168.10.51:3901"

  # Remote clusters in other K8s clusters
  # Nodes are auto-discovered via Admin API
  remoteClusters:
    - name: garage-eu
      zone: eu-west-2
      connection:
        adminApiEndpoint: "http://truenas.faust:30190"

  layoutManagement:
    autoApply: true
    minNodesHealthy: 1 # Wait for 2/3 nodes before applying layout
