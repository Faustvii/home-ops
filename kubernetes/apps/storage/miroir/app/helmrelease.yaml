# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: miroir
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # global:
    #   tolerations:
    #     - key: dedicated
    #       value: talos-03
    #       effect: NoSchedule
    replicaCount: 2
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      podMonitor:
        enabled: true
      prometheusRule:
        enabled: true
