---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app moltis
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      *app :
        type: statefulset

        initContainers:
          daemon:
            image:
              repository: docker
              tag: 29.4.0-dind@sha256:a6dd5322747a95cd8e3207bd8d415a8fd20ec34e9c00f06dc019cbd912013489
            restartPolicy: Always
            securityContext:
              privileged: true
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: true
            env:
              - name: DOCKER_TLS_CERTDIR
                value: /certs
            probes:
              startup:
                enabled: true
                custom: true
                spec: &probeSpec
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60

              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *probeSpec
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3

              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *probeSpec
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3

        containers:
          app:
            image:
              repository: ghcr.io/moltis-org/moltis
              tag: latest@sha256:ec2108b6b74cc04c990a4581455219d45c162b9667aa223cda091ec419ada899
            args:
              - --bind
              - "::"
              - --port
              - "13131"
              - --no-tls
            env:
              TZ: "${TZ}"

              MOLTIS_NO_TLS: true
              MOLTIS_BEHIND_PROXY: true

              MOLTIS_CONFIG_DIR: /config
              MOLTIS_DATA_DIR: /data

              MOLTIS_WEBAUTHN_RP_ID: "{{ .Release.Name }}.${SECRET_DOMAIN}"
              MOLTIS_WEBAUTHN_ORIGIN: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"

              DOCKER_HOST: tcp://localhost:2376
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 13131
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true

    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      main:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /config
            subPath: config
          - path: /data
            subPath: data

      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /certs
            subPath: certs
          - path: /home/moltis/.docker
            subPath: home
          - path: /tmp
            subPath: tmp
