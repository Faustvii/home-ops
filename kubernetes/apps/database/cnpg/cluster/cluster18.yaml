---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: &name postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:58c9a9e29a23b814f8f335ce178727d83bc40d96ed7fe8977192d2d8cdcb3927

  storage:
    size: 8Gi
  managed:
    roles:
      - name: infisical
        login: true
        ensure: present
        superuser: false
        disablePassword: false
        passwordSecret:
          name: infisical-postgres
      - name: bookarr
        login: true
        ensure: present
        superuser: false
        disablePassword: false
        passwordSecret:
          name: bookarr-postgres

    services:
      additional:
        - selectorType: r
          serviceTemplate:
            metadata:
              name: postgres-18
              annotations:
                gatus.home-operations.com/enabled: "true"
                gatus.home-operations.com/endpoint: |
                  name: postgres-18
                  group: internal
                  ui:
                    hide-url: true
                    hide-hostname: true
            spec:
              type: ClusterIP
          updateStrategy: patch

  # bootstrap:
    # recovery:
    #   source: &src source

  plugins:
    - name: &plugin barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: &store minio-store

  externalClusters:
    - name: source
      plugin:
        name: *plugin
        parameters:
          barmanObjectName: *store
          serverName: postgres

  monitoring:
    enablePodMonitor: true
