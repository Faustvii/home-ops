---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/main/dist/schemas/pocketidinstance_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: pocket-id
spec:
  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: ENCRYPTION_KEY
  appUrl: https://idm.${SECRET_DOMAIN}
  databaseUrl:
    valueFrom:
      secretKeyRef:
        name: pocket-id-postgres
        key: uri
  image: ghcr.io/pocket-id/pocket-id:v2.11.0-distroless@sha256:446624a84743c29f93db2ffbbe19f9059fd9741e0cb2516d31efcc764e131835
  analyticsDisabled: true
  versionCheckDisabled: true
  fileBackend: database
  metrics:
    enabled: true
  userManagement:
    allowOwnAccountEdit: true
    allowUserSignups: "disabled"
  ui:
    appName: "FaustID"
    homePageUrl: /settings/apps
  route:
    enabled: true
    parentRefs:
      - name: envoy-external
        namespace: network
