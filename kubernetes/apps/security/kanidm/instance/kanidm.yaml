apiVersion: kaniop.rs/v1beta1
kind: Kanidm
metadata:
  name: kanidm
spec:
  domain: idm.${SECRET_DOMAIN}
  tlsSecretName: kanidm-tls

  image: mirror.gcr.io/kanidm/server:1.10.2@sha256:5d671b5ecb47bc0b5f37d3306f9e7b9b387998bdf5aa451d76a4e764cc05f0fb

  replicaGroups:
    - name: default
      replicas: 1
      role: write_replica

  oauth2ClientNamespaceSelector: {}
  groupNamespaceSelector: {}
  personNamespaceSelector: {}
  serviceAccountNamespaceSelector: {}

  domainAppearance:
    displayName: "faust hub"

  storage:
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 100Mi
