apiVersion: kaniop.rs/v1beta1
kind: Kanidm
metadata:
  name: kanidm
spec:
  domain: idm.${SECRET_DOMAIN}
  tlsSecretName: kanidm-tls

  image: mirror.gcr.io/kanidm/server:1.10.3@sha256:d0ff76d6ec6d292d5710bd6ec801d9d5ccf12e3cdcdfe4d122efa5a351a97cbe

  replicaGroups:
    - name: default
      replicas: 1
      role: write_replica

  oauth2ClientNamespaceSelector: {}
  groupNamespaceSelector: {}
  personNamespaceSelector: {}
  serviceAccountNamespaceSelector: {}

  domainAppearance:
    displayName: "faust hub"

  storage:
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 100Mi
