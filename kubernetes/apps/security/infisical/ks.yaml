---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app infisical
spec:
  interval: 1h
  path: ./kubernetes/apps/security/infisical/app
  components:
    - ../../../../components/database/postgres
    - ../../../../components/database/dragonfly
  dependsOn:
    - name: cnpg
      namespace: database
    - name: dragonfly
      namespace: database
  postBuild:
    substitute:
      APP: *app
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: security
  wait: false
