---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
spec:
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "[::]:4317"
          http:
            endpoint: "[::]:4318"

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      deltatocumulative:
        max_stale: 5m

    exporters:
      debug: {}
      otlp_grpc:
        endpoint: vtsingle-vt-otel.observability.svc.cluster.local:4317
        compression: gzip
        tls:
          insecure: true
      otlp_http:
        compression: gzip
        encoding: proto
        metrics_endpoint: http://vmsingle-vmks.observability.svc.cluster.local:8428/opentelemetry/v1/metrics
        logs_endpoint: http://vlsingle-vl.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [otlp_grpc]
        logs:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [otlp_http]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, deltatocumulative]
          exporters: [otlp_http]
