---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: smartctl-exporter
  interval: 1h
  values:
    fullnameOverride: *app
    serviceMonitor:
      enabled: true
      attachMetadata:
        node: true
      relabelings:
        # Set target labels to the Kubernetes node name for DaemonSet pods.
        - action: replace
          sourceLabels:
            - __meta_kubernetes_endpoint_node_name
          targetLabel: instance
        - action: replace
          sourceLabels:
            - __meta_kubernetes_endpoint_node_name
          targetLabel: node
        # Temporary debug labels to verify relabeling is applied at target level.
        - action: replace
          sourceLabels:
            - __meta_kubernetes_endpoint_node_name
          targetLabel: debug_node
        - action: replace
          sourceLabels:
            - __meta_kubernetes_endpoint_address_target_name
          targetLabel: debug_pod
        - action: replace
          replacement: relabel-ok
          targetLabel: debug_static
    prometheusRules:
      enabled: false
