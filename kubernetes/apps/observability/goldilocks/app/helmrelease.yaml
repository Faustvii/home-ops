---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
spec:
  interval: 1h
  chart:
    spec:
      chart: goldilocks
      version: 10.4.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds-goldilocks
  values:
    image:
      repository: us-docker.pkg.dev/fairwinds-ops/oss/goldilocks
      tag: v4.14.1@sha256:2d84efd26bc0d865c9078997494c96b09b3cbb9021e29fdca684afe53806cce4
    controller:
      enabled: true
      includedNamespaces:
        - observability
        - default
        - media
        - database
        - matrix

    dashboard:
      enabled: true
      service:
        type: ClusterIP
        port: 8080

    vpa:
      enabled: false
