---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
spec:
  interval: 1h
  chart:
    spec:
      chart: goldilocks
      version: 10.4.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds-goldilocks
  values:
    image:
      repository: us-docker.pkg.dev/fairwinds-ops/oss/goldilocks
      tag: v4.15.1@sha256:244b52b53aa4bb56b53c50f5b6b617612619a8f76571bd1e21d7d8157b3aee9e
    controller:
      enabled: true
      includedNamespaces:
        - observability
        - default
        - media
        - database
        - matrix

    dashboard:
      enabled: true
      service:
        type: ClusterIP
        port: 8080

    vpa:
      enabled: false
