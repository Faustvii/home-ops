---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/operator.victoriametrics.com/vtsingle_v1.json
apiVersion: operator.victoriametrics.com/v1
kind: VTSingle
metadata:
  name: vt
spec:
  extraArgs:
    otlpGRPCListenAddr: ":4317"
    otlpGRPC.tls: "false"
  retentionPeriod: 14d
  retentionMaxDiskSpaceUsageBytes: 20GB
  serviceSpec:
    metadata:
      name: vtsingle-vt-otel
    spec:
      ports:
        - name: grpc
          port: 4317
          protocol: TCP
          targetPort: 4317
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
