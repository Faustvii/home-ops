---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/operator.victoriametrics.com/vlagent_v1.json
apiVersion: operator.victoriametrics.com/v1
kind: VLAgent
metadata:
  name: vl
spec:
  k8sCollector:
    enabled: true
    includePodLabels: true
    # Normalize stream identity around one app label key plus namespace.
    streamFields:
      - kubernetes.namespace
      - kubernetes.pod_labels.app.kubernetes.io/name
    # Prevent VLAgent self-ingestion and drop known noisy apps.
    excludeFilter: |-
      kubernetes.pod_name:=%{HOSTNAME}
      or kubernetes.pod_labels.app.kubernetes.io/name:="vpa"
      or kubernetes.pod_labels.app.kubernetes.io/name:="goldilocks"
  remoteWrite:
    - url: http://vlsingle-vl.observability.svc.cluster.local:9428/insert/native
