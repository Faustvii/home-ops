---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vm-k8s-stack
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.86.0
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-k8s-stack
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token.actions.githubusercontent.com$"
        subject: "^https://github.com/VictoriaMetrics/helm-charts.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmks
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: vm-k8s-stack
  dependsOn:
    - name: victoria-metrics-operator
  values:
    global:
      cluster:
        dnsDomain: cluster.local.
    nameOverride: vmks
    crds:
      enabled: false
    victoria-metrics-operator:
      enabled: false
    defaultDashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: grafana
    defaultDatasources:
      grafanaOperator:
        enabled: false
    defaultRules:
      create: true
    alertmanager:
      enabled: true
      route:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames: ["alertmanager.${SECRET_DOMAIN}"]
      spec:
        configReloaderExtraArgs:
          enableTCP6: "true"
        externalURL: https://alertmanager.${SECRET_DOMAIN}
        disableNamespaceMatcher: true
        storage:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 1Gi
    vmalert:
      enabled: true
      spec:
        extraArgs:
          enableTCP6: "true"
        configReloaderExtraArgs:
          enableTCP6: "true"
    grafana:
      enabled: false
    vmsingle:
      spec:
        extraArgs:
          enableTCP6: "true"
          maxLabelsPerTimeseries: "40"
          search.maxUniqueTimeseries: "600000"
          search.minStalenessInterval: 5m
          opentelemetry.usePrometheusNaming: "true"
        replicaCount: 1
        retentionPeriod: 14d
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
        useDefaultResources: false
        useStrictSecurity: true
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
    vmagent:
      spec:
        extraArgs:
          enableTCP6: "true"
        configReloaderExtraArgs:
          enableTCP6: "true"
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 150m
        selectAllByDefault: true
        scrapeInterval: 20s
    prometheus-node-exporter:
      enabled: false
    nodeExporter:
      operatingSystems:
        linux:
          enabled: false
        aix:
          enabled: false
        darwin:
          enabled: false
    kube-state-metrics:
      enabled: true
      fullnameOverride: kube-state-metrics
    kubeApiServer:
      enabled: true
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - port: http-metrics
              scheme: http
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    coreDns:
      enabled: false
    extraRules:
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: Kubernetes cluster Dockerhub rate limit risk
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
