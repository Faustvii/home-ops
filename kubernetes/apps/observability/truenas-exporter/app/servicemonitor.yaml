apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: truenas
spec:
  selector:
    matchLabels:
      app: truenas
  endpoints:
    - port: smartctl-metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
    - port: node-exporter-metrics
      interval: 30s
      path: /metrics
      relabelings:
        - targetLabel: job
          replacement: node-exporter
