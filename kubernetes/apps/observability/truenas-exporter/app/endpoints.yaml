apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-metrics
  labels:
    app: truenas
subsets:
  - addresses:
      - ip: 192.168.1.94
    ports:
      - name: smartctl-metrics
        port: 9633
      - name: node-exporter-metrics
        port: 9100
        relabelings:
          - targetLabel: job
            replacement: node-exporter
